<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jade KB Builder Sign In</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ FAVICON_PNG_HREF }}" />
    <link rel="apple-touch-icon" href="{{ APPLE_TOUCH_ICON_HREF }}" />
    <link rel="shortcut icon" href="{{ FAVICON_ICO_HREF }}" />
    <link rel="stylesheet" href="{{ LOGIN_CSS_HREF }}" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card">
        <div class="login-card__brand">
          <img class="login-card__logo" src="{{ LOGO_HREF }}" alt="Jade KB Builder logo" />
          <div>
            <div class="login-card__eyebrow">Protected Jade KB Workspace</div>
            <div class="login-card__brand-name">Jade KB Builder</div>
          </div>
        </div>
        <h1>Sign in to the web interface</h1>
        <p class="login-card__copy">
          Access is limited to approved team credentials. Host this behind HTTPS and keep the auth secrets in your environment, not in the repo.
        </p>

        <form class="login-form" id="loginForm">
          <label class="login-form__field">
            <span>Username</span>
            <input id="usernameInput" name="username" type="text" autocomplete="username" required />
          </label>
          <label class="login-form__field">
            <span>Password</span>
            <input id="passwordInput" name="password" type="password" autocomplete="current-password" required />
          </label>
          <p class="login-form__error" id="loginError" hidden></p>
          <button class="login-form__submit" id="loginButton" type="submit">Sign in</button>
        </form>
      </section>
    </main>

    <script src="{{ LOGIN_JS_HREF }}" defer></script>
  </body>
</html>
